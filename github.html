<!DOCTYPE html>
<html lang="en">
<head>
  <!-- 문자 인코딩 설정 -->
  <meta charset="UTF-8">
  <!-- 모바일 화면 크기 대응 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 브라우저 탭 제목 -->
  <title>GitHub | Gunwoo Kim Portfolio</title>
  <!-- CSS 파일 연결 -->
  <link rel="stylesheet" href="style.css">
</head>
<!-- github 화면 전용 클래스 지정 -->
<body class="github-page">
  <!-- 공통 상단 영역 -->
  <header class="site-header">
    <!-- 메인 제목 -->
    <h1>KIM GUNWOO - PORTFOLIO</h1>
    <!-- 네비게이션 메뉴 -->
    <nav>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="github.html">GitHub</a></li>
      </ul>
    </nav>
    <!-- 테마 전환 버튼 영역 -->
    <div class="theme-switcher-wrap">
      <!-- 다음 단계에서 JavaScript로 연결할 버튼 -->
      <button class="theme-toggle-button" type="button">
        <!-- 스위치 모양 영역 -->
        <span class="theme-toggle-track" aria-hidden="true">
          <!-- 왼쪽/오른쪽으로 움직일 동그라미 -->
          <span class="theme-toggle-thumb"></span>
        </span>
        <!-- 버튼 안내 문구 -->
        <span class="theme-toggle-text">Switch Theme</span>
      </button>
    </div>
  </header>

  <!-- 본문 영역 -->
  <main class="page-main">
    <!-- GitHub 소개 섹션 -->
    <section class="page-panel">
      <h2 class="page-title">GitHub</h2>
      
      <!-- JavaScript가 GitHub 데이터를 채워 넣는 영역 -->
      <div class="github-data-shell" data-github-username="gunuzello">
        <!-- 로딩/에러 문구 -->
        <p class="github-status-message">Loading GitHub data...</p>

        <!-- 프로필 정보가 들어갈 영역 -->
        <div class="github-profile-root"></div>

        <!-- 저장소 목록이 들어갈 영역 -->
        <div class="github-repo-root"></div>
      </div>
    </section>
  </main>

  <!-- 하단 영역 -->
  <footer>
    <p>&copy; 2026 Gunwoo Kim</p>
  </footer>
  <!-- JavaScript 파일 연결 -->
  <script src="script.js"></script>
</body>
</html>
